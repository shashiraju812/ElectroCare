name: electrical_shop_app
description: "EELECTROCARE — Electrical Products & Services Marketplace"
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ── UI & Design ──────────────────────────────────────────
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  flutter_animate: ^4.2.0
  font_awesome_flutter: ^10.6.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_launcher_icons: ^0.13.1

  # ── State Management ─────────────────────────────────────
  provider: ^6.1.2
  flutter_riverpod: ^2.5.1
  dartz: ^0.10.1
  shimmer: ^3.0.0

  # ── Local Storage ────────────────────────────────────────
  shared_preferences: ^2.2.2

  # ── Utilities ────────────────────────────────────────────
  intl: ^0.20.2
  url_launcher: ^6.3.0
  uuid: ^4.4.0
  pin_code_fields: ^8.0.1
  google_maps_flutter: ^2.12.0
  geocoding: ^3.0.0

  # ── Firebase ─────────────────────────────────────────────
  firebase_core: ^3.13.0
  firebase_auth: ^5.6.0
  cloud_firestore: ^5.6.0
  firebase_analytics: ^11.6.0
  google_sign_in: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mocktail: ^1.0.4

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/lottie/
    - assets/icons/
